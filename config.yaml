substitutions:
  device_name: "growbox-sensor-01"
  friendly_name: "Growbox Sensor 01"
  
  # --- USER CONFIGURATION START ---
  wifi_ssid: "Your_WiFi_Name"
  wifi_password: "Your_WiFi_Password"
  
  ap_ssid: "GrowSensor Setup"
  ap_password: "SetupPassword123"

  # Options: AHT10, AHT20, AHT21, or AHT30
  aht_variant: "AHT20" 
  update_interval: "60s"
  # --- USER CONFIGURATION END ---

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

captive_portal:
logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  fast_connect: true
  reboot_timeout: 15min 
  ap:
    ssid: "${ap_ssid}"
    password: "${ap_password}"

interval:
  - interval: 24h
    then:
      - button.press: restart_button

button:
  - platform: restart
    name: "${friendly_name} Restart"
    id: restart_button

number:
  - platform: template
    name: "${friendly_name} Leaf Temp Offset"
    id: leaf_offset
    min_value: -10
    max_value: 5
    step: 0.1
    initial_value: -2.0
    optimistic: true
    restore_value: true
    unit_of_measurement: "°C"
    mode: box

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  id: bus_a

sensor:
  - platform: aht10
    variant: ${aht_variant}
    i2c_id: bus_a
    temperature:
      name: "${friendly_name} Temperature"
      id: temperature_sensor
    humidity:
      name: "${friendly_name} Humidity"
      id: humidity_sensor
    update_interval: ${update_interval}

  # This section is for combo sensors. If not using BMP280, you can delete this.
  - platform: bmp280_i2c
    i2c_id: bus_a
    address: 0x76
    pressure:
      name: "${friendly_name} Pressure"
      id: pressure_sensor
    update_interval: ${update_interval}

  - platform: template
    name: "${friendly_name} VPD"
    id: vpd_sensor
    unit_of_measurement: "kPa"
    accuracy_decimals: 2
    icon: "mdi:water-percent"
    update_interval: ${update_interval}
    lambda: |-
      if (id(temperature_sensor).has_state() && id(humidity_sensor).has_state()) {
        float t_air  = id(temperature_sensor).state;
        float t_leaf = t_air + id(leaf_offset).state; 
        float rh     = id(humidity_sensor).state / 100.0;
        // Tetens Formula
        float svp_air  = 0.6108 * exp(17.27 * t_air  / (t_air  + 237.3));
        float svp_leaf = 0.6108 * exp(17.27 * t_leaf / (t_leaf + 237.3));
        return svp_leaf - (rh * svp_air);
      }
      return NAN;

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
  - platform: uptime
    name: "${friendly_name} Uptime"
