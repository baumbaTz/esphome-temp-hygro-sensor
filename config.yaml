substitutions:
  # --- USER CONFIGURATION START ---
  # Change these in case you use more than one, or if you want another name
  device_name: "growbox-sensor-01"
  friendly_name: "Growbox Sensor 01"

  # AP credentials for the fallback hotspot.
  # On first boot (or when your configured WiFi is unreachable), the device
  # will start this AP after 60s. Connect to it and set up your WiFi via
  # the captive portal in your browser. Credentials are saved to flash and
  # survive reboots and OTA updates.
  ap_ssid: "GrowSensor Setup"
  ap_password: "SetupPassword123"

  # Sensor variant — options: AHT10, AHT20, AHT21, AHT30
  # AHT20 works correctly for all variants in practice. Only change this if
  # your readings look wrong or the sensor fails to initialize.
  aht_variant: "AHT20"

  update_interval: "60s"
  # --- USER CONFIGURATION END ---

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enables captive portal redirect when in fallback AP mode
captive_portal:

# Web UI — accessible at http://growbox-sensor-01.local after WiFi setup
web_server:
  port: 80

logger:

api:
  # Prevent api component from rebooting device when no HA connection exists.
  # Without this, device reboots every 1min on first boot before AP can start.
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  # No hardcoded WiFi credentials here — configure via the captive portal AP on first boot.
  # Credentials are stored in flash and persist across reboots and OTA updates.
  # If the saved network is unreachable, the fallback AP starts after 60s.

  # reboot_timeout: how long to keep trying WiFi before rebooting (default: 15min).
  reboot_timeout: 15min

  ap:
    ssid: "${ap_ssid}"
    password: "${ap_password}"
    # ap_timeout: how long to wait with no WiFi before starting the fallback AP.
    # Default is 90s. IMPORTANT: 0s disables automatic AP startup entirely, do not use 0s.
    ap_timeout: 60s

# 24h auto-restart keeps memory clean on long-running sensor nodes.
# The uptime check prevents this from firing immediately after boot —
# a corrupted interval timer in flash can otherwise trigger an instant reboot loop.
interval:
  - interval: 24h
    then:
      - if:
          condition:
            lambda: 'return id(uptime_sensor).state > 3600;'
          then:
            - button.press: restart_button

button:
  - platform: restart
    name: "${friendly_name} Restart"
    id: restart_button

number:
  - platform: template
    name: "${friendly_name} Leaf Temp Offset"
    id: leaf_offset
    min_value: -10
    max_value: 5
    step: 0.1
    initial_value: -2.0
    optimistic: true
    restore_value: true
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-minus"
    mode: box

i2c:
  sda: GPIO8
  scl: GPIO9
  # scan: true logs found I2C addresses on boot — helpful for debugging and
  # costs nothing on a sensor node. Fine to leave on permanently.
  scan: true
  id: bus_a

sensor:
  # --- AHT temperature + humidity ---
  # variant supports: AHT10, AHT20, AHT21, AHT30
  # AHT20 works for all variants in practice — only change if readings are wrong.
  # AHT10 uses the legacy aht10 platform; AHT20/21/30 also use this platform in ESPHome.
  - platform: aht10
    variant: ${aht_variant}
    i2c_id: bus_a
    temperature:
      name: "${friendly_name} Temperature"
      id: temperature_sensor
    humidity:
      name: "${friendly_name} Humidity"
      id: humidity_sensor
    update_interval: ${update_interval}

  # --- BMP280 air pressure (optional — only for combo AHT+BMP boards) ---
  # ESPHome has no conditional block support, so there is no substitution toggle for this.
  # If your board HAS a BMP280: uncomment the block below.
  # If your board does NOT have a BMP280: leave this commented out (a missing sensor
  # declared in YAML will cause a hard boot error).
  # Common I2C addresses: 0x76 (default) or 0x77

  # - platform: bmp280_i2c
  #   i2c_id: bus_a
  #   address: 0x76
  #   pressure:
  #     name: "${friendly_name} Pressure"
  #     id: pressure_sensor
  #   update_interval: ${update_interval}

  # --- VPD (Vapour Pressure Deficit) ---
  # Uses Tetens formula with a leaf temperature offset (leaf runs cooler than air).
  # Leaf offset is configurable in Home Assistant via the number entity above.
  # Initial value: -2.0°C (standard cannabis grow assumption).
  - platform: template
    name: "${friendly_name} VPD"
    id: vpd_sensor
    unit_of_measurement: "kPa"
    accuracy_decimals: 2
    icon: "mdi:water-percent"
    update_interval: ${update_interval}
    lambda: |-
      if (id(temperature_sensor).has_state() && id(humidity_sensor).has_state()) {
        float t_air  = id(temperature_sensor).state;
        float t_leaf = t_air + id(leaf_offset).state;  // offset is stored as negative, e.g. -2.0
        float rh     = id(humidity_sensor).state / 100.0;
        // Tetens formula — returns kPa
        float svp_air  = 0.6108 * exp(17.27 * t_air  / (t_air  + 237.3));
        float svp_leaf = 0.6108 * exp(17.27 * t_leaf / (t_leaf + 237.3));
        return svp_leaf - (rh * svp_air);
      }
      return NAN;

  # --- Diagnostics ---
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s
